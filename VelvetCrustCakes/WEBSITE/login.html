<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Zitow's Cake House</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container centered-card">
        <div class="logo">
		<img src="zitowscakehouse.png" alt="Zitow Logo" class="logo-img">
		Zitow's Cake House
		</div>
        <h2>Welcome Back</h2>
        <div class="input-group" style="margin-bottom: 15px;">
            <input type="email" placeholder="Email Address" style="width:100%; padding:12px; border-radius:15px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.2); color:white;">
        </div>
        <div class="input-group" style="margin-bottom: 25px;">
            <input type="password" placeholder="Password" style="width:100%; padding:12px; border-radius:15px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.2); color:white;">
        </div>
        <button class="btn-cream" style="width: 100%;">Sign In</button>
        <p style="margin-top: 20px;"><a href="index.html" style="color: var(--cream); text-decoration: none;">← Back to Home</a></p>
    </div>
</body>
</html>
